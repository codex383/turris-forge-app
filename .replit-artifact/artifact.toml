kind = "web"
previewPath = "/"
title = "Turris Forge Studios"
version = "1.0.0"
id = "artifacts/turris-forge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20645

[services.development]
run = "pnpm --filter @workspace/turris-forge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/turris-forge", "run", "build" ]
publicDir = "artifacts/turris-forge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20645"
BASE_PATH = "/"
